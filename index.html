<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방문객 등록 시스템</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ⚠️ [중요] 여기에 본인의 구글 Apps Script 웹 앱 URL을 직접 입력하세요.
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaVegL5KGQ6qW7ivusQV7xxjdIdLD56bKykdWw1-1mpONQX__mWkwdvKU7xPvAn_NM/exec";

        // 아이콘 컴포넌트
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        function App() {
            // 관리자 모드를 제거하고 바로 방문객 폼을 렌더링합니다.
            return (
                <div className="min-h-screen">
                    <VisitorForm scriptUrl={GOOGLE_SCRIPT_URL} />
                </div>
            );
        }

        function VisitorForm({ scriptUrl }) {
            const [formData, setFormData] = useState({ name: '', title: '', affiliation: '' });
            const [status, setStatus] = useState('idle');

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!scriptUrl || scriptUrl.includes("여기에")) {
                    alert("코드 내에 구글 스크립트 주소가 설정되지 않았습니다.");
                    return;
                }
                
                setStatus('submitting');
                try {
                    const data = new URLSearchParams();
                    Object.keys(formData).forEach(key => data.append(key, formData[key]));
                    
                    await fetch(scriptUrl, { 
                        method: 'POST', 
                        mode: 'no-cors', 
                        body: data 
                    });
                    
                    setTimeout(() => setStatus('success'), 800);
                } catch (err) { 
                    console.error(err);
                    setStatus('error'); 
                }
            };

            if (status === 'success') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-900 animate-fade-in">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center space-y-6">
                            <div className="mx-auto w-24 h-24 bg-green-50 rounded-full flex items-center justify-center">
                                <Icon name="check-circle-2" size={48} className="text-green-500" />
                            </div>
                            <div className="space-y-2">
                                <h2 className="text-3xl font-black text-slate-900">등록 완료</h2>
                                <p className="text-slate-500 font-medium">정보가 성공적으로 전송되었습니다.<br/>방문해 주셔서 감사합니다.</p>
                            </div>
                            <button onClick={() => setStatus('idle')} className="w-full py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold hover:bg-slate-200 transition-all">새로 등록</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-gray-50 animate-fade-in">
                    <div className="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-xl border border-gray-100 max-w-md w-full relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-2 bg-slate-900"></div>
                        <div className="text-center mb-10">
                            <div className="mx-auto w-16 h-16 bg-slate-900 rounded-2xl flex items-center justify-center mb-4 shadow-xl shadow-slate-200">
                                <Icon name="clipboard-list" size={32} className="text-white" />
                            </div>
                            <h1 className="text-3xl font-black text-gray-900">방문객 등록</h1>
                            <p className="text-gray-400 mt-2 font-medium">정보를 입력하고 등록 버튼을 눌러주세요.</p>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div className="space-y-2">
                                <label className="text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">성함</label>
                                <div className="relative">
                                    <Icon name="user" size={20} className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-300" />
                                    <input type="text" required placeholder="성함을 입력하세요" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full pl-12 pr-4 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-slate-900 outline-none transition-all font-medium" />
                                </div>
                            </div>
                            <div className="space-y-2">
                                <label className="text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">직함</label>
                                <div className="relative">
                                    <Icon name="briefcase" size={20} className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-300" />
                                    <input type="text" required placeholder="예: 매니저, 팀장" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} className="w-full pl-12 pr-4 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-slate-900 outline-none transition-all font-medium" />
                                </div>
                            </div>
                            <div className="space-y-2">
                                <label className="text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">소속</label>
                                <div className="relative">
                                    <Icon name="building" size={20} className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-300" />
                                    <input type="text" required placeholder="회사 또는 기관명" value={formData.affiliation} onChange={e => setFormData({...formData, affiliation: e.target.value})} className="w-full pl-12 pr-4 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-slate-900 outline-none transition-all font-medium" />
                                </div>
                            </div>
                            <button type="submit" disabled={status === 'submitting'} className="w-full py-5 bg-slate-900 text-white font-bold rounded-2xl shadow-xl disabled:opacity-50 flex items-center justify-center gap-2 text-lg active:scale-[0.98] transition-all">
                                {status === 'submitting' ? <span className="w-6 h-6 border-2 border-white/30 border-t-white rounded-full animate-spin"></span> : "등록 완료하기"}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
