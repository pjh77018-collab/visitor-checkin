<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방문객 등록 시스템</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 아이콘 컴포넌트 유틸리티
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        function App() {
            const [mode, setMode] = useState('admin');
            const [scriptUrl, setScriptUrl] = useState('');

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const modeParam = params.get('mode');
                const urlParam = params.get('url');
                
                if (modeParam === 'visitor' && urlParam) {
                    setMode('visitor');
                    setScriptUrl(urlParam);
                }
            }, []);

            const switchToVisitor = (url) => { setScriptUrl(url); setMode('visitor'); };
            const switchToAdmin = () => { setMode('admin'); };

            return (
                <div className="min-h-screen">
                    {mode === 'admin' ? (
                        <AdminPanel onInternalPreview={switchToVisitor} />
                    ) : (
                        <VisitorForm scriptUrl={scriptUrl} onBack={switchToAdmin} />
                    )}
                </div>
            );
        }

        function AdminPanel({ onInternalPreview }) {
            const [inputUrl, setInputUrl] = useState('');
            const [qrUrl, setQrUrl] = useState('');
            const [copied, setCopied] = useState(false);

            const gasCode = `function doPost(e) {
  try {
    var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
    var name = e.parameter.name || "미상";
    var title = e.parameter.title || "미상";
    var affiliation = e.parameter.affiliation || "미상";
    var timestamp = new Date();
    sheet.appendRow([timestamp, name, title, affiliation]);
    return ContentService.createTextOutput("Success").setMimeType(ContentService.MimeType.TEXT);
  } catch (f) {
    return ContentService.createTextOutput("Error: " + f.toString()).setMimeType(ContentService.MimeType.TEXT);
  }
}`;

            const handleGenerateQR = () => {
                if (!inputUrl.trim().includes('script.google.com')) {
                    alert("올바른 구글 Apps Script URL을 입력해주세요.");
                    return;
                }
                const currentUrl = window.location.href.split('?')[0];
                const visitorLink = `${currentUrl}?mode=visitor&url=${encodeURIComponent(inputUrl.trim())}`;
                setQrUrl(visitorLink);
            };

            const copyToClipboard = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-10 space-y-8 animate-fade-in">
                    <div className="bg-slate-900 rounded-3xl p-8 text-white shadow-xl">
                        <h1 className="text-2xl font-bold mb-2 flex items-center gap-2">
                            <Icon name="settings" className="text-blue-400" /> 방문객 시스템 관리자
                        </h1>
                        <p className="text-slate-400 text-sm">이 페이지 주소를 기억해 두세요. QR 생성과 설정이 여기서 이루어집니다.</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 space-y-4">
                            <h2 className="font-bold flex items-center gap-2 text-lg">
                                <Icon name="info" size={20} className="text-blue-500" /> 설정 가이드
                            </h2>
                            <div className="text-sm space-y-3">
                                <p>1. 구글 시트의 [확장 프로그램 > Apps Script]에 코드를 붙여넣으세요.</p>
                                <div className="relative">
                                    <pre className="bg-gray-50 p-3 rounded-xl text-[10px] overflow-x-auto max-h-32">{gasCode}</pre>
                                    <button onClick={() => copyToClipboard(gasCode)} className="absolute top-2 right-2 p-1 bg-white border rounded">
                                        {copied ? <Icon name="check" size={14} className="text-green-500" /> : <Icon name="copy" size={14} />}
                                    </button>
                                </div>
                                <p>2. 배포 시 <b>'모든 사용자(Anyone)'</b>로 권한을 설정하세요.</p>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex flex-col items-center">
                            <h2 className="font-bold self-start mb-4 flex items-center gap-2 text-lg">
                                <Icon name="qr-code" size={20} className="text-blue-500" /> QR 생성
                            </h2>
                            <input 
                                type="text" 
                                placeholder="GAS 웹 앱 URL 입력" 
                                value={inputUrl}
                                onChange={(e) => setInputUrl(e.target.value)}
                                className="w-full p-3 bg-gray-50 border rounded-xl mb-3 text-sm outline-none focus:ring-2 focus:ring-blue-500"
                            />
                            <button onClick={handleGenerateQR} className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-all">QR 생성/업데이트</button>
                            
                            {qrUrl && (
                                <div className="mt-6 text-center animate-fade-in">
                                    <img src={`https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(qrUrl)}`} className="mx-auto border p-2 bg-white rounded-lg mb-4" />
                                    <button onClick={() => onInternalPreview(inputUrl)} className="text-blue-600 text-sm font-bold flex items-center gap-1 mx-auto">
                                        기기에서 직접 테스트하기 <Icon name="chevron-right" size={16} />
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function VisitorForm({ scriptUrl, onBack }) {
            const [formData, setFormData] = useState({ name: '', title: '', affiliation: '' });
            const [status, setStatus] = useState('idle');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setStatus('submitting');
                try {
                    const data = new URLSearchParams();
                    Object.keys(formData).forEach(key => data.append(key, formData[key]));
                    await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: data });
                    setTimeout(() => setStatus('success'), 800);
                } catch (err) { setStatus('error'); }
            };

            if (status === 'success') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-900 animate-fade-in">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center space-y-6">
                            <Icon name="check-circle-2" size={60} className="text-green-500 mx-auto" />
                            <h2 className="text-2xl font-bold">등록 완료</h2>
                            <p className="text-gray-500">방문해주셔서 감사합니다.</p>
                            <button onClick={() => setStatus('idle')} className="w-full py-4 bg-slate-100 rounded-2xl font-bold">새로 등록</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-gray-50 animate-fade-in">
                    <div className="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-xl border border-gray-100 max-w-md w-full relative">
                        <div className="text-center mb-8">
                            <h1 className="text-3xl font-black mb-2">방문객 등록</h1>
                            <p className="text-gray-400">아래 정보를 입력해주세요.</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="text-xs font-bold text-gray-400 uppercase ml-1">성함</label>
                                <input type="text" required placeholder="이름" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-slate-900" />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-gray-400 uppercase ml-1">직함</label>
                                <input type="text" required placeholder="과장, 팀장 등" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} className="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-slate-900" />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-gray-400 uppercase ml-1">소속</label>
                                <input type="text" required placeholder="회사명" value={formData.affiliation} onChange={e => setFormData({...formData, affiliation: e.target.value})} className="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-slate-900" />
                            </div>
                            <button type="submit" disabled={status === 'submitting'} className="w-full py-5 bg-slate-900 text-white font-bold rounded-2xl shadow-lg disabled:opacity-50">
                                {status === 'submitting' ? "전송 중..." : "등록하기"}
                            </button>
                        </form>
                        <button onClick={onBack} className="mt-6 w-full text-xs text-gray-300 hover:text-gray-500">관리자 모드 전환</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
